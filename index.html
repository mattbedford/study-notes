<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio — Appunti e Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f4;
            --text: #2c2418;
            --text-light: #6b5d4d;
            --border: #d4c5b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Serif 4', Georgia, serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .page {
            max-width: 700px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 0.3rem;
        }
        header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .subjects {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .subject-card {
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1.8rem;
            background: #fff;
            transition: box-shadow 0.2s;
        }

        .subject-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .subject-card .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 0.4rem;
        }

        .subject-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }

        .subject-card .desc {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
        }

        .subject-card .links {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .subject-card .links a {
            display: inline-block;
            font-family: 'Source Serif 4', serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            transition: opacity 0.15s;
        }

        .subject-card .links a:hover { opacity: 0.85; }

        .subject-card .links a.notes { background: #8b4513; }
        .subject-card .links a.quiz { background: #5b7a3a; }

        .subject-card.coming-soon {
            opacity: 0.45;
            pointer-events: none;
        }

        .subject-card.coming-soon .links a {
            background: #aaa;
        }

        .badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: var(--border);
            color: var(--text-light);
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-light);
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <h1>📚 Studio</h1>
        <p>Appunti e quiz interattivi</p>
    </header>

    <div class="subjects">

        <div class="subject-card">
            <div class="label">Storia dell'Arte</div>
            <h2>Il Romanico</h2>
            <div class="desc">Unità 6 · XI–XIII secolo · Chiese, scultura e vita medievale</div>
            <div class="links">
                <a href="arte/notes.html" class="notes">📖 Appunti</a>
                <a href="arte/quiz.html" class="quiz">✏️ Quiz</a>
            </div>
        </div>

        <div class="subject-card coming-soon">
            <div class="label">Scienze</div>
            <h2>In arrivo…</h2>
            <div class="desc">Prossimo argomento</div>
            <div class="links">
                <a href="#" class="notes">📖 Appunti</a>
                <a href="#" class="quiz">✏️ Quiz</a>
            </div>
        </div>

    </div>

    <footer>
        Fai tap su un argomento per iniziare
    </footer>

</div>
</body>
</html>
